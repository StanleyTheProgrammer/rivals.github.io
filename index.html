<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>3D Shooter – English Quiz</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { 
            background:#000; 
            overflow:hidden; 
            font-family:Arial,sans-serif; 
            position:fixed; 
            width:100vw; 
            height:100dvh;
        }
        #gameCanvas { 
            display:block; 
            width:100%; 
            height:100%; 
            position:absolute; 
            top:0; 
            left:0; 
            z-index:1;
        }
        #ui-layer { 
            position:absolute; 
            top:0; 
            left:0; 
            width:100%; 
            height:100%; 
            pointer-events:none; 
            z-index:10; 
        }
        #health-bar-container { 
            position:absolute; 
            top:20px; 
            left:20px; 
            right:20px; 
            height:18px; 
            background:rgba(0,0,0,0.6); 
            border-radius:10px; 
            overflow:hidden; 
            border:2px solid rgba(255,255,255,0.5); 
        }
        #health-bar-fill { 
            height:100%; 
            width:100%; 
            background:#ff4444; 
            border-radius:8px; 
            transition:width 0.3s; 
        }
        #health-label { 
            position:absolute; 
            top:42px; 
            left:50%; 
            transform:translateX(-50%); 
            color:#fff; 
            font-size:12px; 
            font-weight:bold; 
            text-shadow:0 0 8px black; 
        }
        #score-display { 
            position:absolute; 
            top:20px; 
            right:20px; 
            color:#ffdd00; 
            font-size:16px; 
            font-weight:bold; 
            background:rgba(0,0,0,0.5); 
            padding:8px 16px; 
            border-radius:20px; 
        }
        #crosshair { 
            position:absolute; 
            top:50%; 
            left:50%; 
            transform:translate(-50%,-50%); 
            width:40px; 
            height:40px; 
        }
        #crosshair::before, #crosshair::after { 
            content:''; 
            position:absolute; 
            background:rgba(255,255,255,0.8); 
        }
        #crosshair::before { 
            width:2px; 
            height:24px; 
            left:50%; 
            top:50%; 
            transform:translate(-50%,-50%); 
        }
        #crosshair::after { 
            width:24px; 
            height:2px; 
            left:50%; 
            top:50%; 
            transform:translate(-50%,-50%); 
        }
        #crosshair-dot { 
            position:absolute; 
            width:6px; 
            height:6px; 
            background:red; 
            border-radius:50%; 
            top:50%; 
            left:50%; 
            transform:translate(-50%,-50%); 
        }
        #joystick-zone { 
            position:absolute; 
            bottom:40px; 
            left:30px; 
            width:140px; 
            height:140px; 
            pointer-events:auto; 
            z-index:20; 
        }
        #joystick-base { 
            width:120px; 
            height:120px; 
            border-radius:50%; 
            background:rgba(255,255,255,0.15); 
            border:3px solid rgba(255,255,255,0.4); 
            position:absolute; 
            top:50%; 
            left:50%; 
            transform:translate(-50%,-50%); 
        }
        #joystick-thumb { 
            width:55px; 
            height:55px; 
            border-radius:50%; 
            background:rgba(255,255,255,0.8); 
            position:absolute; 
            top:50%; 
            left:50%; 
            transform:translate(-50%,-50%); 
            box-shadow:0 0 15px black; 
        }
        #shoot-button { 
            position:absolute; 
            bottom:50px; 
            right:30px; 
            width:90px; 
            height:90px; 
            border-radius:50%; 
            background:radial-gradient(circle at 30% 30%, #ff5555, #aa0000); 
            border:3px solid white; 
            pointer-events:auto; 
            z-index:20; 
            display:flex; 
            align-items:center; 
            justify-content:center; 
            color:white; 
            font-weight:bold; 
            font-size:18px; 
        }
        #hit-flash { 
            position:absolute; 
            top:0; 
            left:0; 
            width:100%; 
            height:100%; 
            background:transparent; 
            pointer-events:none; 
            z-index:8; 
            transition:background 0.1s; 
        }

        #quiz-overlay { 
            position:fixed; 
            top:0; 
            left:0; 
            width:100%; 
            height:100%; 
            background:rgba(0,0,0,0.6); 
            display:none; 
            align-items:center; 
            justify-content:center; 
            z-index:9999;
        }
        #quiz-overlay.active { display:flex; }
        #quiz-card { 
            background:#1a1a2e; 
            border:3px solid #e94560; 
            border-radius:20px; 
            padding:25px; 
            max-width:500px; 
            width:92%; 
            text-align:center; 
            color:white; 
        }
        #quiz-title { font-size:22px; font-weight:bold; margin-bottom:5px; color:#ff6b6b; }
        #quiz-progress { font-size:13px; color:#ffdd00; margin-bottom:12px; }
        #quiz-question { font-size:17px; margin:12px 0; font-weight:bold; line-height:1.4; }
        
        #quiz-answer-input {
            width: 100%;
            padding: 15px;
            font-size: 18px;
            border-radius: 12px;
            border: 2px solid #fff;
            background: #fff;
            color: #000;
            text-align: center;
            margin: 12px 0;
            outline: none;
            -webkit-appearance: none;
        }
        #quiz-answer-input:focus { border-color: #e94560; }
        #quiz-answer-input::placeholder { color: #999; }
        
        #quiz-submit {
            width: 100%;
            padding: 15px;
            font-size: 18px;
            border-radius: 12px;
            border: none;
            background: #e94560;
            color: white;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        #quiz-submit:active { background: #cc3355; }
        #quiz-feedback { font-size:14px; margin-top:10px; min-height:20px; }
        #loading-screen { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); color:white; font-size:24px; z-index:200; }
        .damage-popup { position:absolute; color:#ffdd00; font-weight:bold; font-size:24px; pointer-events:none; z-index:50; text-shadow:0 0 10px rgba(255,200,0,0.8); animation:floatUp 1s ease-out forwards; }
        @keyframes floatUp { 0% { opacity:1; transform:translateY(0); } 100% { opacity:0; transform:translateY(-60px); } }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    
    <div id="ui-layer">
        <div id="health-bar-container"><div id="health-bar-fill"></div></div>
        <div id="health-label">HP 250</div>
        <div id="score-display">Score: 0</div>
        <div id="crosshair"><div id="crosshair-dot"></div></div>
        <div id="joystick-zone">
            <div id="joystick-base"></div>
            <div id="joystick-thumb"></div>
        </div>
        <div id="shoot-button">FIRE</div>
        <div id="hit-flash"></div>
        <div id="loading-screen">Loading data...</div>
    </div>

    <div id="quiz-overlay">
        <div id="quiz-card">
            <div id="quiz-title">💀 YOU DIED</div>
            <div id="quiz-progress">Answer questions to respawn (0/3)</div>
            <div id="quiz-question"></div>
            <input type="text" id="quiz-answer-input" placeholder="Type your answer" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" enterkeyhint="done">
            <button id="quiz-submit">Submit Answer</button>
            <div id="quiz-feedback"></div>
        </div>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js" } }
    </script>
    <script type="module">
        import * as THREE from 'three';

        // ========== LOAD DATA ==========
        let STATS, QUESTIONS;
        let npcTexture = null;
        
        async function loadData() {
            try {
                // Load JSON files from your structure
                const [s, q] = await Promise.all([
                    fetch('scripts/jsons/stats.json'),
                    fetch('scripts/jsons/questions.json')
                ]);
                STATS = await s.json();
                QUESTIONS = await q.json();
                
                // Load NPC texture
                const textureLoader = new THREE.TextureLoader();
                npcTexture = await new Promise((resolve) => {
                    textureLoader.load('images/homeless.jpeg', resolve, undefined, () => {
                        // Fallback - create a colored texture if image fails
                        console.warn('Failed to load homeless.jpeg, using fallback');
                        resolve(null);
                    });
                });
                
                document.getElementById('loading-screen').style.display = 'none';
                initGame();
            } catch(e) {
                console.error('Load error:', e);
                document.getElementById('loading-screen').textContent = 'Error loading data. Check paths.';
            }
        }

        // ========== DOM REFS ==========
        const gameCanvas = document.getElementById('gameCanvas');
        const healthFill = document.getElementById('health-bar-fill');
        const healthLabel = document.getElementById('health-label');
        const scoreDisplay = document.getElementById('score-display');
        const shootBtn = document.getElementById('shoot-button');
        const joystickThumb = document.getElementById('joystick-thumb');
        const joystickZone = document.getElementById('joystick-zone');
        const hitFlash = document.getElementById('hit-flash');
        const quizOverlay = document.getElementById('quiz-overlay');
        const quizQuestion = document.getElementById('quiz-question');
        const quizInput = document.getElementById('quiz-answer-input');
        const quizSubmitBtn = document.getElementById('quiz-submit');
        const quizFeedback = document.getElementById('quiz-feedback');
        const quizProgress = document.getElementById('quiz-progress');
        const uiLayer = document.getElementById('ui-layer');

        // ========== GAME STATE ==========
        let scene, camera, renderer, clock;
        let buildings = [], npcs = [], playerBullets = [], npcBullets = [];
        let player;
        let correctCount = 0, currentQuestion = null, usedQuestions = [];

        // ========== QUIZ FUNCTIONS ==========
        function showQuiz() {
            quizOverlay.classList.add('active');
            correctCount = 0;
            updateQuizProgress();
            pickQuestion();
            setTimeout(() => quizInput.focus(), 400);
        }

        function hideQuiz() {
            quizOverlay.classList.remove('active');
            quizInput.blur();
            quizInput.value = '';
        }

        function pickQuestion() {
            const qs = QUESTIONS.questions;
            let avail = qs.filter(q => !usedQuestions.includes(q));
            if (avail.length === 0) { usedQuestions = []; avail = qs; }
            currentQuestion = avail[Math.floor(Math.random() * avail.length)];
            usedQuestions.push(currentQuestion);
            quizQuestion.textContent = currentQuestion.q;
            quizInput.value = '';
            quizFeedback.textContent = '';
            setTimeout(() => quizInput.focus(), 300);
        }

        function updateQuizProgress() {
            quizProgress.textContent = `Answer questions to respawn (${correctCount}/${STATS.quiz.requiredCorrect})`;
        }

        function submitAnswer() {
            const answer = quizInput.value.trim().toLowerCase();
            const correct = currentQuestion.answer.toLowerCase();
            
            if (answer === correct) {
                correctCount++;
                quizFeedback.textContent = '✅ Correct!';
                quizFeedback.style.color = '#00ff66';
                updateQuizProgress();
                
                if (correctCount >= STATS.quiz.requiredCorrect) {
                    setTimeout(() => {
                        player.health = player.maxHealth;
                        player.dead = false;
                        player.pos.set(0, 1.7, 0);
                        hideQuiz();
                        correctCount = 0;
                    }, 800);
                } else {
                    setTimeout(pickQuestion, 800);
                }
            } else {
                quizFeedback.textContent = '❌ Wrong answer. Try again!';
                quizFeedback.style.color = '#ff4444';
                quizInput.value = '';
                setTimeout(() => quizInput.focus(), 200);
            }
        }

        // Submit handlers
        quizSubmitBtn.addEventListener('click', submitAnswer);
        quizSubmitBtn.addEventListener('touchend', (e) => {
            e.preventDefault();
            submitAnswer();
        });

        quizInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                submitAnswer();
            }
        });

        quizInput.addEventListener('touchstart', (e) => {
            e.stopPropagation();
        });

        // ========== GAME INIT ==========
        function initGame() {
            const s = STATS;
            
            renderer = new THREE.WebGLRenderer({ canvas: gameCanvas, antialias: true });
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            
            scene = new THREE.Scene();
            scene.background = new THREE.Color('#87CEEB');
            scene.fog = new THREE.Fog('#87CEEB', 25, 70);
            
            camera = new THREE.PerspectiveCamera(70, window.innerWidth/window.innerHeight, 0.2, 80);
            camera.position.set(0, 1.7, 0);
            scene.add(camera);

            scene.add(new THREE.AmbientLight('#ffffff', 0.6));
            const sun = new THREE.DirectionalLight('#ffffff', 1.8);
            sun.position.set(15, 25, 10);
            sun.castShadow = true;
            sun.shadow.mapSize.set(1024, 1024);
            scene.add(sun);

            const ground = new THREE.Mesh(
                new THREE.PlaneGeometry(60, 60),
                new THREE.MeshStandardMaterial({ color: '#4a8c3f', roughness: 0.9 })
            );
            ground.rotation.x = -Math.PI / 2;
            ground.receiveShadow = true;
            scene.add(ground);

            const bData = [
                [-10,-10,3,5,3,'#b0a89c'],[10,-8,4,6,2.5,'#c4b9a8'],[-8,8,2.5,4,4,'#a89880'],
                [9,9,3.5,7,3.5,'#bfb09a'],[-13,2,2,3.5,5,'#d4c8b0'],[13,-4,5,5,2,'#9e8e78'],
                [0,-15,6,3,3,'#c8bca5'],[3,14,3,6,4,'#a09080'],[-6,-17,3.5,3.5,3.5,'#c0b098'],
                [7,-14,2.5,6,2.5,'#a89878']
            ];
            bData.forEach(([x,z,w,h,d,col]) => {
                const geo = new THREE.BoxGeometry(w,h,d);
                const mat = new THREE.MeshStandardMaterial({color:col,roughness:0.7});
                const mesh = new THREE.Mesh(geo,mat);
                mesh.position.set(x,h/2,z);
                mesh.castShadow = mesh.receiveShadow = true;
                mesh.userData = {type:'building',x,z,w,h,d};
                scene.add(mesh);
                buildings.push(mesh);
            });

            player = {
                pos: new THREE.Vector3(0,1.7,0),
                health: s.player.health,
                maxHealth: s.player.maxHealth,
                score: 0,
                dead: false,
                yaw: 0,
                pitch: 0,
                shootCooldown: 0,
                radius: s.player.radius,
                moveSpeed: s.player.moveSpeed,
            };

            const gun = new THREE.Mesh(
                new THREE.BoxGeometry(0.1,0.1,0.5),
                new THREE.MeshStandardMaterial({color:'#333',metalness:0.8})
            );
            gun.position.set(0.2,-0.2,-0.5);
            camera.add(gun);

            for (let i = 0; i < s.game.npcCount; i++) {
                const angle = Math.random() * Math.PI * 2;
                spawnNPC(Math.cos(angle)*s.game.spawnDistance, Math.sin(angle)*s.game.spawnDistance);
            }

            setupControls();
            clock = new THREE.Clock();
            requestAnimationFrame(gameLoop);
        }

        function spawnNPC(x, z) {
            const group = new THREE.Group();
            
            // Body
            const bodyGeo = new THREE.CapsuleGeometry(0.35, 0.9);
            const bodyMat = new THREE.MeshStandardMaterial({ 
                color: '#aa3333', 
                roughness: 0.5,
            });
            const body = new THREE.Mesh(bodyGeo, bodyMat);
            group.add(body);
            
            // Head with homeless.jpeg texture if loaded
            const headGeo = new THREE.SphereGeometry(0.3);
            let headMat;
            if (npcTexture) {
                headMat = new THREE.MeshStandardMaterial({ 
                    map: npcTexture,
                    roughness: 0.8,
                });
            } else {
                headMat = new THREE.MeshStandardMaterial({ 
                    color: '#e8c8a0',
                    roughness: 0.8,
                });
            }
            const head = new THREE.Mesh(headGeo, headMat);
            head.position.y = 1.9;
            group.add(head);
            
            group.position.set(x, 0, z);
            scene.add(group);
            
            npcs.push({
                mesh: group,
                health: STATS.npc.health,
                alive: true,
                shootTimer: 1 + Math.random() * 2,
            });
        }

        function spawnParticles(pos, color) {
            for (let i=0; i<6; i++) {
                const p = new THREE.Mesh(
                    new THREE.SphereGeometry(0.04),
                    new THREE.MeshBasicMaterial({color,transparent:true,opacity:1})
                );
                p.position.copy(pos);
                p.userData = {
                    vel: new THREE.Vector3((Math.random()-0.5)*3, Math.random()*2+1, (Math.random()-0.5)*3),
                    life: 0.4
                };
                scene.add(p);
                const anim = () => {
                    p.userData.life -= 0.016;
                    p.material.opacity = p.userData.life/0.4;
                    p.position.add(p.userData.vel.clone().multiplyScalar(0.016));
                    p.userData.vel.y -= 0.05;
                    if (p.userData.life <= 0) { scene.remove(p); return; }
                    requestAnimationFrame(anim);
                };
                anim();
            }
        }

        function createBullet(origin, dir, speed, color, isPlayer) {
            const b = new THREE.Mesh(
                new THREE.SphereGeometry(0.06),
                new THREE.MeshBasicMaterial({color})
            );
            b.position.copy(origin);
            b.userData = { vel: dir.normalize().multiplyScalar(speed), life: 2, isPlayer };
            scene.add(b);
            if (isPlayer) playerBullets.push(b);
            else npcBullets.push(b);
        }

        function playerShoot() {
            if (player.dead || player.shootCooldown > 0) return;
            player.shootCooldown = STATS.player.shootDelay;
            const dir = new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion);
            createBullet(player.pos.clone().add(dir.clone().multiplyScalar(0.5)), dir, STATS.player.bulletSpeed, '#ffdd44', true);
        }

        function npcShoot(npc) {
            const origin = npc.mesh.position.clone();
            origin.y += 1.5;
            const dir = player.pos.clone().sub(origin).normalize();
            dir.x += (Math.random()-0.5)*0.2;
            dir.y += (Math.random()-0.5)*0.15;
            dir.z += (Math.random()-0.5)*0.2;
            dir.normalize();
            createBullet(origin, dir, STATS.npc.bulletSpeed, '#ff4444', false);
        }

        function resolveCollision(pos, r) {
            for (const b of buildings) {
                const d = b.userData;
                if (pos.y > d.h) continue;
                const hw = d.w/2, hd = d.d/2;
                const cx = Math.max(d.x-hw, Math.min(pos.x, d.x+hw));
                const cz = Math.max(d.z-hd, Math.min(pos.z, d.z+hd));
                const dx = pos.x-cx, dz = pos.z-cz;
                const dist = Math.sqrt(dx*dx+dz*dz);
                if (dist < r && dist > 0.01) {
                    const overlap = r - dist;
                    pos.x += (dx/dist) * overlap;
                    pos.z += (dz/dist) * overlap;
                }
            }
        }

        function setupControls() {
            let jx=0, jy=0, ja=false, jid=null, jbx=0, jby=0;
            
            joystickZone.addEventListener('touchstart', (e) => {
                if (player.dead || quizOverlay.classList.contains('active')) return;
                const t = e.touches[0];
                ja = true; jid = t.identifier;
                const r = joystickZone.getBoundingClientRect();
                jbx = r.left + r.width/2;
                jby = r.top + r.height/2;
            }, {passive: false});
            
            joystickZone.addEventListener('touchmove', (e) => {
                if (!ja) return;
                for (const t of e.touches) {
                    if (t.identifier === jid) {
                        let dx = t.clientX - jbx, dy = t.clientY - jby;
                        const dist = Math.sqrt(dx*dx+dy*dy);
                        if (dist > 45) { dx = (dx/dist)*45; dy = (dy/dist)*45; }
                        jx = dx/45; jy = dy/45;
                        joystickThumb.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
                    }
                }
            }, {passive: false});
            
            joystickZone.addEventListener('touchend', () => {
                ja = false; jx = 0; jy = 0;
                joystickThumb.style.transform = 'translate(-50%, -50%)';
            });

            shootBtn.addEventListener('touchstart', (e) => {
                if (!player.dead && !quizOverlay.classList.contains('active')) playerShoot();
                e.preventDefault();
            });

            let la=false, lid=null, lpx=0, lpy=0;
            document.addEventListener('touchstart', (e) => {
                if (quizOverlay.classList.contains('active')) return;
                for (const t of e.touches) {
                    if (t.clientX > window.innerWidth/2 && t.target !== shootBtn && !joystickZone.contains(t.target)) {
                        la = true; lid = t.identifier;
                        lpx = t.clientX; lpy = t.clientY;
                    }
                }
            }, {passive: false});
            
            document.addEventListener('touchmove', (e) => {
                if (!la || quizOverlay.classList.contains('active')) return;
                for (const t of e.touches) {
                    if (t.identifier === lid) {
                        player.yaw -= (t.clientX-lpx)*0.003;
                        player.pitch -= (t.clientY-lpy)*0.003;
                        player.pitch = Math.max(-1.2, Math.min(1.2, player.pitch));
                        lpx = t.clientX; lpy = t.clientY;
                    }
                }
            }, {passive: false});
            
            document.addEventListener('touchend', (e) => {
                for (const t of e.changedTouches) {
                    if (t.identifier === lid) la = false;
                }
            });

            const keys = {};
            window.addEventListener('keydown', e => { keys[e.key.toLowerCase()] = true; });
            window.addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; });
            window.addEventListener('mousedown', () => { if (!player.dead) playerShoot(); });

            window._controls = { jx:()=>jx, jy:()=>jy, keys:()=>keys };
        }

        function gameLoop() {
            requestAnimationFrame(gameLoop);
            const dt = Math.min(clock.getDelta(), 0.1);
            if (player.dead) {
                renderer.render(scene, camera);
                return;
            }

            const s = STATS;
            const ctrl = window._controls;
            const jx = ctrl.jx(), jy = ctrl.jy(), keys = ctrl.keys();

            let mx = jx, mz = jy;
            if (keys['w'] || keys['arrowup']) mz = -1;
            if (keys['s'] || keys['arrowdown']) mz = 1;
            if (keys['a'] || keys['arrowleft']) mx = -1;
            if (keys['d'] || keys['arrowright']) mx = 1;
            
            const mag = Math.sqrt(mx*mx + mz*mz);
            if (mag > 1) { mx /= mag; mz /= mag; }
            
            if (mag > 0.01) {
                const forward = new THREE.Vector3(-Math.sin(player.yaw), 0, -Math.cos(player.yaw));
                const right = new THREE.Vector3(Math.cos(player.yaw), 0, -Math.sin(player.yaw));
                const move = forward.multiplyScalar(-mz).add(right.multiplyScalar(mx)).normalize().multiplyScalar(player.moveSpeed * dt);
                const np = player.pos.clone().add(move);
                resolveCollision(np, player.radius);
                player.pos.copy(np);
            }
            player.pos.y = 1.7;
            camera.position.copy(player.pos);
            camera.rotation.order = 'YXZ';
            camera.rotation.y = player.yaw;
            camera.rotation.x = player.pitch;
            
            if (player.shootCooldown > 0) player.shootCooldown -= dt;

            for (const npc of npcs) {
                if (!npc.alive) continue;
                const toP = player.pos.clone().sub(npc.mesh.position);
                const dist = toP.length();
                
                if (dist < s.game.detectionRange && dist > 1.5) {
                    const md = toP.clone(); md.y = 0;
                    if (md.length() > 0.01) {
                        md.normalize().multiplyScalar(s.npc.speed * dt);
                        const np = npc.mesh.position.clone().add(md);
                        resolveCollision(np, s.npc.radius);
                        npc.mesh.position.copy(np);
                    }
                    npc.mesh.lookAt(player.pos.x, 0, player.pos.z);
                }
                
                if (dist < s.game.attackRange) {
                    npc.shootTimer -= dt;
                    if (npc.shootTimer <= 0) {
                        npc.shootTimer = s.npc.shootDelay;
                        npcShoot(npc);
                    }
                }
            }

            for (const arr of [playerBullets, npcBullets]) {
                for (const b of arr) {
                    b.position.add(b.userData.vel.clone().multiplyScalar(dt));
                    b.userData.life -= dt;
                }
            }

            for (let i = playerBullets.length-1; i >= 0; i--) {
                const b = playerBullets[i];
                let hit = false;
                for (const npc of npcs) {
                    if (!npc.alive) continue;
                    const hp = npc.mesh.position.clone(); hp.y += 1.9;
                    const bp = npc.mesh.position.clone(); bp.y += 1.0;
                    if (b.position.distanceTo(hp) < 0.4) {
                        npc.health -= s.npc.headDamage;
                        spawnParticles(hp, '#ff3333');
                        if (npc.health <= 0) { npc.alive = false; scene.remove(npc.mesh); player.score += s.npc.headScore; }
                        scene.remove(b); playerBullets.splice(i,1); hit = true; break;
                    } else if (b.position.distanceTo(bp) < 0.9) {
                        npc.health -= s.npc.bodyDamage;
                        spawnParticles(bp, '#ffdd44');
                        if (npc.health <= 0) { npc.alive = false; scene.remove(npc.mesh); player.score += s.npc.bodyScore; }
                        scene.remove(b); playerBullets.splice(i,1); hit = true; break;
                    }
                }
                if (hit) continue;
                if (b.userData.life <= 0 || Math.abs(b.position.x) > 35 || Math.abs(b.position.z) > 35 || b.position.y < -3 || b.position.y > 20) {
                    scene.remove(b); playerBullets.splice(i,1);
                }
            }

            for (let i = npcBullets.length-1; i >= 0; i--) {
                const b = npcBullets[i];
                if (b.position.distanceTo(player.pos) < 0.7) {
                    player.health -= s.npc.damageToPlayer + Math.floor(Math.random()*8);
                    player.health = Math.max(0, player.health);
                    hitFlash.style.background = 'rgba(255,0,0,0.5)';
                    setTimeout(() => hitFlash.style.background = 'transparent', 150);
                    scene.remove(b); npcBullets.splice(i,1);
                    if (player.health <= 0) { player.dead = true; showQuiz(); }
                    continue;
                }
                if (b.userData.life <= 0 || Math.abs(b.position.x) > 35 || Math.abs(b.position.z) > 35 || b.position.y < -3 || b.position.y > 20) {
                    scene.remove(b); npcBullets.splice(i,1);
                }
            }

            healthFill.style.width = (player.health/player.maxHealth*100) + '%';
            healthLabel.textContent = 'HP ' + Math.round(player.health);
            scoreDisplay.textContent = 'Score: ' + player.score;

            if (npcs.filter(n=>n.alive).length < s.game.npcCount) {
                const a = Math.random()*Math.PI*2;
                spawnNPC(Math.cos(a)*s.game.spawnDistance, Math.sin(a)*s.game.spawnDistance);
            }

            renderer.render(scene, camera);
        }

        loadData();
    </script>
</body>
</html>
