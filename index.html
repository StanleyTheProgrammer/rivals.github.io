<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>3D Shooter – English Quiz</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background:#000; overflow:hidden; font-family:Arial,sans-serif; position:fixed; width:100vw; height:100dvh; }
        #gameCanvas { display:block; width:100%; height:100%; position:absolute; top:0; left:0; }
        #ui-layer { position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:10; }
        #health-bar-container { position:absolute; top:20px; left:20px; right:20px; height:18px; background:rgba(0,0,0,0.6); border-radius:10px; overflow:hidden; border:2px solid rgba(255,255,255,0.5); }
        #health-bar-fill { height:100%; width:100%; background:#ff4444; border-radius:8px; transition:width 0.3s; }
        #health-label { position:absolute; top:42px; left:50%; transform:translateX(-50%); color:#fff; font-size:12px; font-weight:bold; text-shadow:0 0 8px black; }
        #score-display { position:absolute; top:20px; right:20px; color:#ffdd00; font-size:16px; font-weight:bold; background:rgba(0,0,0,0.5); padding:8px 16px; border-radius:20px; }
        #crosshair { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:40px; height:40px; }
        #crosshair::before, #crosshair::after { content:''; position:absolute; background:rgba(255,255,255,0.8); }
        #crosshair::before { width:2px; height:24px; left:50%; top:50%; transform:translate(-50%,-50%); }
        #crosshair::after { width:24px; height:2px; left:50%; top:50%; transform:translate(-50%,-50%); }
        #crosshair-dot { position:absolute; width:6px; height:6px; background:red; border-radius:50%; top:50%; left:50%; transform:translate(-50%,-50%); }
        #joystick-zone { position:absolute; bottom:40px; bottom:calc(40px + env(safe-area-inset-bottom,20px)); left:30px; width:140px; height:140px; pointer-events:auto; z-index:20; }
        #joystick-base { width:120px; height:120px; border-radius:50%; background:rgba(255,255,255,0.15); border:3px solid rgba(255,255,255,0.4); position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); }
        #joystick-thumb { width:55px; height:55px; border-radius:50%; background:rgba(255,255,255,0.8); position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); box-shadow:0 0 15px black; }
        #shoot-button { position:absolute; bottom:50px; bottom:calc(50px + env(safe-area-inset-bottom,20px)); right:30px; width:90px; height:90px; border-radius:50%; background:radial-gradient(circle at 30% 30%, #ff5555, #aa0000); border:3px solid white; pointer-events:auto; z-index:20; display:flex; align-items:center; justify-content:center; color:white; font-weight:bold; font-size:18px; }
        #hit-flash { position:absolute; top:0; left:0; width:100%; height:100%; background:transparent; pointer-events:none; z-index:8; transition:background 0.1s; }

        #quiz-overlay { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.55); display:none; align-items:center; justify-content:center; z-index:9999; }
        #quiz-overlay.active { display:flex; }
        #quiz-card { background:#1a1a2e; border:3px solid #e94560; border-radius:20px; padding:20px; max-width:500px; width:95%; text-align:center; color:white; }
        #quiz-title { font-size:20px; font-weight:bold; margin-bottom:4px; color:#ff6b6b; }
        #quiz-progress { font-size:12px; color:#ffdd00; margin-bottom:8px; }
        #quiz-question { font-size:15px; margin:8px 0; font-weight:bold; line-height:1.3; }

        #answer-display {
            background:#fff; color:#000; font-size:20px; padding:12px; border-radius:8px; min-height:45px; margin:8px 0;
            border:2px solid #fff; text-align:center; word-break:break-all;
        }
        #answer-display:empty::after { content:"Your answer will appear here"; color:#999; }

        /* Desktop input */
        #desktop-input-container { margin:8px 0; }
        #desktop-input { width:100%; padding:12px; font-size:18px; border-radius:8px; border:2px solid #fff; background:#fff; color:#000; text-align:center; outline:none; }
        #desktop-submit { width:100%; margin-top:8px; padding:12px; font-size:18px; border-radius:8px; border:none; background:#e94560; color:white; font-weight:bold; cursor:pointer; }

        /* iOS‑style custom keyboard */
        #custom-keyboard { display:flex; flex-direction:column; gap:6px; margin:8px 0; background:#CED0D6; border-radius:12px; padding:8px; }
        .keyboard-row { display:flex; gap:6px; justify-content:center; }
        .key-btn {
            flex:1; padding:12px 6px; font-size:17px; font-weight:500; border-radius:8px; border:none;
            background:#F0F0F2; color:#000; box-shadow:0 1px 2px rgba(0,0,0,0.2); cursor:pointer;
            min-width:28px; -webkit-tap-highlight-color:transparent; transition:transform 0.1s, background 0.1s;
            touch-action:manipulation; user-select:none;
        }
        .key-btn:active { background:#BEC0C4; transform:scale(0.94); }
        .key-btn.special { background:#A8AAB0; color:#fff; font-size:14px; }
        .key-btn.submit-btn { background:#007AFF; color:#fff; font-weight:bold; font-size:16px; }
        .key-btn.space-btn { flex:3; font-size:18px; }

        #quiz-feedback { font-size:13px; margin-top:6px; min-height:18px; }
        #loading-screen { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); color:white; font-size:24px; z-index:200; }
        .damage-popup { position:absolute; color:#ffdd00; font-weight:bold; font-size:24px; pointer-events:none; z-index:50; text-shadow:0 0 10px rgba(255,200,0,0.8); animation:floatUp 1s ease-out forwards; }
        @keyframes floatUp { 0% { opacity:1; transform:translateY(0); } 100% { opacity:0; transform:translateY(-60px); } }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <div id="ui-layer">
        <div id="health-bar-container"><div id="health-bar-fill"></div></div>
        <div id="health-label">HP 250</div>
        <div id="score-display">Score: 0</div>
        <div id="crosshair"><div id="crosshair-dot"></div></div>
        <div id="joystick-zone"><div id="joystick-base"></div><div id="joystick-thumb"></div></div>
        <div id="shoot-button">FIRE</div>
        <div id="hit-flash"></div>
        <div id="loading-screen">Loading data...</div>
    </div>

    <div id="quiz-overlay">
        <div id="quiz-card">
            <div id="quiz-title">💀 YOU DIED</div>
            <div id="quiz-progress">Answer questions to respawn (0/3)</div>
            <div id="quiz-question"></div>
            <div id="answer-display"></div>
            <!-- Desktop version (hidden on touch devices) -->
            <div id="desktop-input-container" style="display:none;">
                <input type="text" id="desktop-input" placeholder="Type your answer here" autocomplete="off">
                <button id="desktop-submit">Submit Answer</button>
            </div>
            <!-- Mobile version – custom iOS‑style keyboard -->
            <div id="custom-keyboard">
                <div class="keyboard-row" id="row1"></div>
                <div class="keyboard-row" id="row2"></div>
                <div class="keyboard-row" id="row3"></div>
                <div class="keyboard-row" id="row4"></div>
            </div>
            <div id="quiz-feedback"></div>
        </div>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js" } }
    </script>
    <script type="module">
        import * as THREE from 'three';

        // ==================== DEVICE DETECTION ====================
        const isTouchDevice = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);

        // ==================== LOAD JSON FILES ====================
        let GAME_STATS = null;
        let QUESTIONS_DATA = null;

        async function loadJSONFiles() {
            try {
                const [statsResponse, questionsResponse] = await Promise.all([
                    fetch('stats.json'),
                    fetch('questions.json')
                ]);
                GAME_STATS = await statsResponse.json();
                QUESTIONS_DATA = await questionsResponse.json();
                document.getElementById('loading-screen').style.display = 'none';
                startGame();
            } catch (error) {
                document.getElementById('loading-screen').textContent = 'Error loading data.';
            }
        }

        // ==================== DOM ELEMENTS ====================
        const canvas = document.getElementById('gameCanvas');
        const healthFill = document.getElementById('health-bar-fill');
        const healthLabel = document.getElementById('health-label');
        const scoreDisplay = document.getElementById('score-display');
        const shootBtn = document.getElementById('shoot-button');
        const joystickThumb = document.getElementById('joystick-thumb');
        const joystickZone = document.getElementById('joystick-zone');
        const hitFlash = document.getElementById('hit-flash');
        const uiLayer = document.getElementById('ui-layer');
        const quizOverlay = document.getElementById('quiz-overlay');
        const quizQuestion = document.getElementById('quiz-question');
        const answerDisplay = document.getElementById('answer-display');
        const quizFeedback = document.getElementById('quiz-feedback');
        const quizProgress = document.getElementById('quiz-progress');
        const desktopInputContainer = document.getElementById('desktop-input-container');
        const desktopInput = document.getElementById('desktop-input');
        const desktopSubmit = document.getElementById('desktop-submit');
        const customKeyboardDiv = document.getElementById('custom-keyboard');

        // ==================== GAME STATE ====================
        let renderer, scene, camera;
        let playerBullets = [], npcBullets = [], npcs = [], buildings = [];
        let correctCount = 0, currentQuestion = null, usedQuestions = [];
        let player, clock;
        let currentAnswer = '';

        // ==================== CUSTOM KEYBOARD ====================
        function buildKeyboard() {
            const row1keys = ['Q','W','E','R','T','Y','U','I','O','P'];
            const row2keys = ['A','S','D','F','G','H','J','K','L'];
            const row3keys = ['Z','X','C','V','B','N','M'];

            const row1 = document.getElementById('row1');
            const row2 = document.getElementById('row2');
            const row3 = document.getElementById('row3');
            const row4 = document.getElementById('row4');

            function makeKey(label, specialClass = '') {
                const btn = document.createElement('button');
                btn.className = 'key-btn' + (specialClass ? ' ' + specialClass : '');
                btn.textContent = label;
                btn.setAttribute('type', 'button');
                btn.addEventListener('touchstart', (e) => {
                    e.preventDefault(); e.stopPropagation();
                    handleKeyPress(label);
                });
                btn.addEventListener('mousedown', (e) => {
                    e.preventDefault(); e.stopPropagation();
                    handleKeyPress(label);
                });
                return btn;
            }

            row1keys.forEach(k => row1.appendChild(makeKey(k)));
            row2keys.forEach(k => row2.appendChild(makeKey(k)));
            row3keys.forEach(k => row3.appendChild(makeKey(k)));

            row4.appendChild(makeKey('⌫', 'special'));       // Backspace
            row4.appendChild(makeKey('space', 'space-btn')); // Space bar
            row4.appendChild(makeKey('Submit', 'submit-btn'));
        }

        function handleKeyPress(key) {
            if (key === '⌫') {
                currentAnswer = currentAnswer.slice(0, -1);
            } else if (key === 'space') {
                currentAnswer += ' ';
            } else if (key === 'Submit') {
                checkAnswer();
                return;
            } else {
                currentAnswer += key.toLowerCase();
            }
            answerDisplay.textContent = currentAnswer;
        }

        function clearAnswer() {
            currentAnswer = '';
            answerDisplay.textContent = '';
            if (desktopInput) desktopInput.value = '';
        }

        // ==================== SHOW DAMAGE POPUP ====================
        function showDamagePopup(worldPos, damage, isHeadshot = false) {
            const vector = worldPos.clone().project(camera);
            const x = (vector.x * 0.5 + 0.5) * window.innerWidth;
            const y = (-vector.y * 0.5 + 0.5) * window.innerHeight;
            const popup = document.createElement('div');
            popup.className = 'damage-popup';
            popup.textContent = isHeadshot ? `💀 ${damage}` : `-${damage}`;
            popup.style.left = x + 'px';
            popup.style.top = y + 'px';
            if (isHeadshot) { popup.style.color = '#ff3333'; popup.style.fontSize = '32px'; }
            uiLayer.appendChild(popup);
            setTimeout(() => { if (popup.parentNode) popup.parentNode.removeChild(popup); }, 1000);
        }

        // ==================== START GAME ====================
        function startGame() {
            const stats = GAME_STATS;

            // Setup quiz input method based on device
            if (isTouchDevice) {
                buildKeyboard();
                desktopInputContainer.style.display = 'none';
                customKeyboardDiv.style.display = 'flex';
            } else {
                desktopInputContainer.style.display = 'block';
                customKeyboardDiv.style.display = 'none';
                desktopSubmit.addEventListener('click', () => {
                    currentAnswer = desktopInput.value;
                    answerDisplay.textContent = currentAnswer;
                    checkAnswer();
                });
                desktopInput.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter') {
                        currentAnswer = desktopInput.value;
                        answerDisplay.textContent = currentAnswer;
                        checkAnswer();
                    }
                });
                desktopInput.addEventListener('input', () => {
                    answerDisplay.textContent = desktopInput.value;
                });
            }

            // ---------- Three.js setup ----------
            renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            scene = new THREE.Scene();
            scene.background = new THREE.Color('#87CEEB');
            scene.fog = new THREE.Fog('#87CEEB', 25, 70);
            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.2, 80);
            camera.position.set(0, 1.7, 0);
            scene.add(camera);

            // Lights
            scene.add(new THREE.AmbientLight('#ffffff', 0.6));
            const sun = new THREE.DirectionalLight('#ffffff', 1.8);
            sun.position.set(15, 25, 10);
            sun.castShadow = true;
            sun.shadow.mapSize.set(1024, 1024);
            scene.add(sun);

            // Ground
            const ground = new THREE.Mesh(
                new THREE.PlaneGeometry(60, 60),
                new THREE.MeshStandardMaterial({ color: '#4a8c3f', roughness: 0.9 })
            );
            ground.rotation.x = -Math.PI / 2;
            ground.receiveShadow = true;
            scene.add(ground);

            // Buildings
            function addBuilding(x, z, w, h, d, color) {
                const geo = new THREE.BoxGeometry(w, h, d);
                const mat = new THREE.MeshStandardMaterial({ color, roughness: 0.7 });
                const mesh = new THREE.Mesh(geo, mat);
                mesh.position.set(x, h / 2, z);
                mesh.castShadow = mesh.receiveShadow = true;
                mesh.userData = { type: 'building', x, z, w, h, d };
                scene.add(mesh);
                buildings.push(mesh);
            }
            const buildingData = [
                [-10,-10,3,5,3,'#b0a89c'], [10,-8,4,6,2.5,'#c4b9a8'], [-8,8,2.5,4,4,'#a89880'],
                [9,9,3.5,7,3.5,'#bfb09a'], [-13,2,2,3.5,5,'#d4c8b0'], [13,-4,5,5,2,'#9e8e78'],
                [0,-15,6,3,3,'#c8bca5'], [3,14,3,6,4,'#a09080'], [-6,-17,3.5,3.5,3.5,'#c0b098'],
                [7,-14,2.5,6,2.5,'#a89878']
            ];
            buildingData.forEach(d => addBuilding(...d));

            // Player
            player = {
                pos: new THREE.Vector3(0, 1.7, 0),
                health: stats.player.health,
                maxHealth: stats.player.maxHealth,
                score: 0,
                dead: false,
                yaw: 0, pitch: 0,
                shootCooldown: 0,
                shootDelay: stats.player.shootDelay,
                radius: stats.player.radius,
                moveSpeed: stats.player.moveSpeed,
            };

            // Gun
            const gun = new THREE.Mesh(
                new THREE.BoxGeometry(0.1, 0.1, 0.5),
                new THREE.MeshStandardMaterial({ color: '#333', metalness: 0.8 })
            );
            gun.position.set(0.2, -0.2, -0.5);
            camera.add(gun);

            // Spawn NPCs
            function spawnNPC(x, z) {
                const group = new THREE.Group();
                group.add(new THREE.Mesh(
                    new THREE.CapsuleGeometry(0.35, 0.9),
                    new THREE.MeshStandardMaterial({ color: '#aa3333', roughness: 0.5 })
                ));
                const head = new THREE.Mesh(
                    new THREE.SphereGeometry(0.3),
                    new THREE.MeshStandardMaterial({ color: '#e8c8a0' })
                );
                head.position.y = 1.9;
                group.add(head);
                group.position.set(x, 0, z);
                scene.add(group);
                npcs.push({
                    mesh: group,
                    health: stats.npc.health,
                    alive: true,
                    shootTimer: 1 + Math.random() * 2,
                    shootDelay: stats.npc.shootDelay,
                    speed: stats.npc.speed,
                });
            }
            for (let i = 0; i < stats.game.npcCount; i++) {
                const angle = Math.random() * Math.PI * 2;
                spawnNPC(Math.cos(angle) * stats.game.spawnDistance, Math.sin(angle) * stats.game.spawnDistance);
            }

            // Particles
            function spawnHitParticles(position, color) {
                for (let i = 0; i < 8; i++) {
                    const particle = new THREE.Mesh(
                        new THREE.SphereGeometry(0.04),
                        new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 1 })
                    );
                    particle.position.copy(position);
                    particle.userData = {
                        vel: new THREE.Vector3(
                            (Math.random() - 0.5) * 4,
                            Math.random() * 3 + 1,
                            (Math.random() - 0.5) * 4
                        ),
                        life: 0.5
                    };
                    scene.add(particle);
                    const remove = () => {
                        particle.userData.life -= 0.016;
                        particle.material.opacity = particle.userData.life / 0.5;
                        particle.position.add(particle.userData.vel.clone().multiplyScalar(0.016));
                        if (particle.userData.life <= 0) { scene.remove(particle); return; }
                        requestAnimationFrame(remove);
                    };
                    remove();
                }
            }

            // Bullets
            function createBullet(origin, dir, speed, color, owner) {
                const bullet = new THREE.Mesh(
                    new THREE.SphereGeometry(0.08),
                    new THREE.MeshBasicMaterial({ color })
                );
                bullet.position.copy(origin);
                bullet.userData = {
                    vel: dir.clone().normalize().multiplyScalar(speed),
                    life: 2.5,
                    owner
                };
                scene.add(bullet);
                if (owner === 'player') playerBullets.push(bullet);
                else npcBullets.push(bullet);
                return bullet;
            }

            function playerShoot() {
                if (player.dead || player.shootCooldown > 0) return;
                player.shootCooldown = player.shootDelay;
                const dir = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
                createBullet(
                    player.pos.clone().add(dir.clone().multiplyScalar(0.6)),
                    dir,
                    stats.player.bulletSpeed,
                    '#ffdd44',
                    'player'
                );
            }

            // Collision resolution
            function resolveCollision(pos, radius) {
                for (const b of buildings) {
                    const d = b.userData;
                    const halfW = d.w / 2, halfD = d.d / 2;
                    const closestX = Math.max(d.x - halfW, Math.min(pos.x, d.x + halfW));
                    const closestZ = Math.max(d.z - halfD, Math.min(pos.z, d.z + halfD));
                    const dx = pos.x - closestX, dz = pos.z - closestZ;
                    const dist = Math.sqrt(dx * dx + dz * dz);
                    if (dist < radius && dist > 0.001 && pos.y < d.h + 0.5) {
                        const overlap = radius - dist;
                        pos.x += (dx / dist) * overlap;
                        pos.z += (dz / dist) * overlap;
                    }
                }
            }

            function npcShoot(npc) {
                const origin = npc.mesh.position.clone();
                origin.y += 1.5;
                let dir = player.pos.clone().sub(origin).normalize();
                dir.x += (Math.random() - 0.5) * 0.15;
                dir.y += (Math.random() - 0.5) * 0.15;
                dir.z += (Math.random() - 0.5) * 0.15;
                dir.normalize();
                createBullet(origin, dir, stats.npc.bulletSpeed, '#ff4444', 'npc');
            }

            // Quiz logic
            function getRandomQuestion() {
                const qs = QUESTIONS_DATA.questions;
                let available = qs.filter(q => !usedQuestions.includes(q));
                if (available.length === 0) { usedQuestions = []; available = qs; }
                const q = available[Math.floor(Math.random() * available.length)];
                usedQuestions.push(q);
                return q;
            }

            function showQuiz() {
                quizOverlay.classList.add('active');
                correctCount = 0;
                updateQuizProgress();
                clearAnswer();
                loadNewQuestion();
            }

            function loadNewQuestion() {
                currentQuestion = getRandomQuestion();
                quizQuestion.textContent = currentQuestion.q;
                clearAnswer();
                quizFeedback.textContent = '';
            }

            function updateQuizProgress() {
                quizProgress.textContent = `Answer questions to respawn (${correctCount}/${stats.quiz.requiredCorrect})`;
            }

            function checkAnswer() {
                const userAnswer = currentAnswer.trim().toLowerCase();
                const correctAnswer = currentQuestion.answer.toLowerCase();
                if (userAnswer === correctAnswer) {
                    correctCount++;
                    quizFeedback.textContent = '✅ Correct!';
                    quizFeedback.style.color = '#00ff66';
                    updateQuizProgress();
                    if (correctCount >= stats.quiz.requiredCorrect) {
                        setTimeout(() => {
                            player.health = player.maxHealth;
                            player.dead = false;
                            player.pos.set(0, 1.7, 0);
                            quizOverlay.classList.remove('active');
                            clearAnswer();
                            correctCount = 0;
                        }, 800);
                    } else {
                        setTimeout(() => loadNewQuestion(), 800);
                    }
                } else {
                    quizFeedback.textContent = '❌ Wrong answer. Try again!';
                    quizFeedback.style.color = '#ff4444';
                    clearAnswer();
                }
            }

            // Controls
            let joyMoveX = 0, joyMoveY = 0, joyActive = false, joyId = null, joyBase = { x: 0, y: 0 };
            joystickZone.addEventListener('touchstart', (e) => {
                if (player.dead || quizOverlay.classList.contains('active')) return;
                const t = e.changedTouches[0];
                joyActive = true; joyId = t.identifier;
                const r = joystickZone.getBoundingClientRect();
                joyBase.x = r.left + r.width / 2;
                joyBase.y = r.top + r.height / 2;
                e.preventDefault();
            });
            joystickZone.addEventListener('touchmove', (e) => {
                if (!joyActive || player.dead || quizOverlay.classList.contains('active')) return;
                for (const t of e.changedTouches) {
                    if (t.identifier === joyId) {
                        let dx = t.clientX - joyBase.x, dy = t.clientY - joyBase.y;
                        const dist = Math.sqrt(dx * dx + dy * dy), max = 50;
                        if (dist > max) { dx = (dx / dist) * max; dy = (dy / dist) * max; }
                        joyMoveX = dx / max; joyMoveY = dy / max;
                        joystickThumb.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
                    }
                }
                e.preventDefault();
            });
            joystickZone.addEventListener('touchend', (e) => {
                for (const t of e.changedTouches) {
                    if (t.identifier === joyId) {
                        joyActive = false; joyMoveX = 0; joyMoveY = 0;
                        joystickThumb.style.transform = 'translate(-50%, -50%)';
                    }
                }
            });

            shootBtn.addEventListener('touchstart', (e) => {
                if (!player.dead && !quizOverlay.classList.contains('active')) playerShoot();
                e.preventDefault();
            });

            let lookActive = false, lookId = null, prevLook = { x: 0, y: 0 };
            document.addEventListener('touchstart', (e) => {
                if (quizOverlay.classList.contains('active')) return;
                for (const t of e.changedTouches) {
                    if (t.clientX > window.innerWidth / 2 && t.target !== shootBtn && !t.target.closest('#joystick-zone')) {
                        lookActive = true; lookId = t.identifier;
                        prevLook.x = t.clientX; prevLook.y = t.clientY;
                    }
                }
            }, { passive: false });
            document.addEventListener('touchmove', (e) => {
                if (!lookActive || quizOverlay.classList.contains('active')) return;
                for (const t of e.changedTouches) {
                    if (t.identifier === lookId) {
                        const dx = t.clientX - prevLook.x, dy = t.clientY - prevLook.y;
                        player.yaw -= dx * 0.003; player.pitch -= dy * 0.003;
                        player.pitch = Math.max(-1.2, Math.min(1.2, player.pitch));
                        prevLook.x = t.clientX; prevLook.y = t.clientY;
                    }
                }
                e.preventDefault();
            }, { passive: false });
            document.addEventListener('touchend', (e) => {
                for (const t of e.changedTouches) if (t.identifier === lookId) lookActive = false;
            });

            const keys = {};
            window.addEventListener('keydown', e => {
                if (quizOverlay.classList.contains('active') && e.key === 'Enter') return;
                keys[e.key.toLowerCase()] = true;
                e.preventDefault();
            });
            window.addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; e.preventDefault(); });
            window.addEventListener('mousedown', e => {
                if (e.button === 0 && !e.target.closest('#quiz-overlay')) playerShoot();
            });

            // Game loop
            clock = new THREE.Clock();
            function update(dt) {
                const s = stats;
                // NPC AI
                for (const npc of npcs) {
                    if (!npc.alive) continue;
                    const toPlayer = new THREE.Vector3().copy(player.pos).sub(npc.mesh.position);
                    const dist = toPlayer.length();
                    if (dist < s.game.detectionRange && dist > 1.2 && !player.dead) {
                        const moveDir = toPlayer.clone(); moveDir.y = 0;
                        if (moveDir.lengthSq() > 0.001) {
                            moveDir.normalize();
                            const newPos = npc.mesh.position.clone().add(moveDir.multiplyScalar(npc.speed * dt));
                            resolveCollision(newPos, s.npc.radius);
                            npc.mesh.position.copy(newPos);
                        }
                        npc.mesh.lookAt(player.pos.x, 0, player.pos.z);
                    }
                    if (dist < s.game.attackRange && !player.dead) {
                        npc.shootTimer -= dt;
                        if (npc.shootTimer <= 0) { npc.shootTimer = npc.shootDelay; npcShoot(npc); }
                    }
                }

                // Update bullets
                for (const arr of [playerBullets, npcBullets]) {
                    for (const b of arr) {
                        b.position.add(b.userData.vel.clone().multiplyScalar(dt));
                        b.userData.life -= dt;
                    }
                }

                // Player movement
                if (!player.dead) {
                    let mx = joyMoveX, mz = joyMoveY;
                    if (keys['w'] || keys['arrowup']) mz = -1;
                    if (keys['s'] || keys['arrowdown']) mz = 1;
                    if (keys['a'] || keys['arrowleft']) mx = -1;
                    if (keys['d'] || keys['arrowright']) mx = 1;
                    const mag = Math.sqrt(mx * mx + mz * mz);
                    if (mag > 1) { mx /= mag; mz /= mag; }
                    const forward = new THREE.Vector3(-Math.sin(player.yaw), 0, -Math.cos(player.yaw));
                    const right = new THREE.Vector3(Math.cos(player.yaw), 0, -Math.sin(player.yaw));
                    const moveVec = forward.multiplyScalar(-mz).add(right.multiplyScalar(mx));
                    if (moveVec.lengthSq() > 0) {
                        moveVec.normalize().multiplyScalar(player.moveSpeed * dt);
                        const newPos = player.pos.clone().add(moveVec);
                        resolveCollision(newPos, player.radius);
                        player.pos.copy(newPos);
                    }
                    player.pos.y = 1.7;
                    camera.position.copy(player.pos);
                    camera.rotation.order = 'YXZ';
                    camera.rotation.y = player.yaw;
                    camera.rotation.x = player.pitch;
                    if (player.shootCooldown > 0) player.shootCooldown -= dt;
                }

                // Player bullets hit NPCs
                for (let i = playerBullets.length - 1; i >= 0; i--) {
                    const b = playerBullets[i];
                    let hit = false;
                    for (const npc of npcs) {
                        if (!npc.alive) continue;
                        const headPos = npc.mesh.position.clone(); headPos.y += 1.9;
                        const bodyPos = npc.mesh.position.clone(); bodyPos.y += 1.0;
                        if (b.position.distanceTo(headPos) < 0.4) {
                            npc.health -= s.npc.headDamage;
                            spawnHitParticles(headPos, '#ff3333');
                            showDamagePopup(headPos, s.npc.headDamage, true);
                            scene.remove(b); playerBullets.splice(i, 1);
                            if (npc.health <= 0) { npc.alive = false; scene.remove(npc.mesh); player.score += s.npc.headScore; }
                            hit = true; break;
                        } else if (b.position.distanceTo(bodyPos) < 0.9) {
                            npc.health -= s.npc.bodyDamage;
                            spawnHitParticles(bodyPos, '#ffdd44');
                            showDamagePopup(bodyPos, s.npc.bodyDamage, false);
                            scene.remove(b); playerBullets.splice(i, 1);
                            if (npc.health <= 0) { npc.alive = false; scene.remove(npc.mesh); player.score += s.npc.bodyScore; }
                            hit = true; break;
                        }
                    }
                    if (hit) continue;
                    if (b.userData.life <= 0 || Math.abs(b.position.x) > s.game.worldSize || Math.abs(b.position.z) > s.game.worldSize || b.position.y < -2 || b.position.y > 20) {
                        scene.remove(b); playerBullets.splice(i, 1);
                    }
                }

                // NPC bullets hit player
                for (let i = npcBullets.length - 1; i >= 0; i--) {
                    const b = npcBullets[i];
                    if (!player.dead && b.position.distanceTo(player.pos) < 0.8) {
                        const dmg = s.npc.damageToPlayer + Math.floor(Math.random() * 10);
                        player.health = Math.max(0, player.health - dmg);
                        hitFlash.style.background = 'rgba(255,0,0,0.5)';
                        setTimeout(() => hitFlash.style.background = 'transparent', 200);
                        scene.remove(b); npcBullets.splice(i, 1);
                        if (player.health <= 0) { player.dead = true; showQuiz(); }
                        continue;
                    }
                    if (b.userData.life <= 0 || Math.abs(b.position.x) > s.game.worldSize || Math.abs(b.position.z) > s.game.worldSize || b.position.y < -2 || b.position.y > 20) {
                        scene.remove(b); npcBullets.splice(i, 1);
                    }
                }

                // UI
                healthFill.style.width = (player.health / player.maxHealth * 100) + '%';
                healthLabel.textContent = 'HP ' + Math.round(player.health);
                scoreDisplay.textContent = 'Score: ' + player.score;

                // Spawn NPCs
                if (npcs.filter(n => n.alive).length < s.game.npcCount && Math.random() < 0.01) {
                    const angle = Math.random() * Math.PI * 2;
                    spawnNPC(Math.cos(angle) * s.game.spawnDistance, Math.sin(angle) * s.game.spawnDistance);
                }
            }

            function animate() {
                requestAnimationFrame(animate);
                const dt = Math.min(clock.getDelta(), 0.1);
                update(dt);
                renderer.render(scene, camera);
            }
            animate();
        }

        // Start everything
        loadJSONFiles();

        window.addEventListener('resize', () => {
            if (renderer && camera) {
                renderer.setSize(window.innerWidth, window.innerHeight);
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
            }
        });
    </script>
</body>
</html>
