<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>3D Shooter - Turtle Conservation (Working)</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none; }
    body { background:#000; overflow:hidden; touch-action:manipulation; font-family:Arial,sans-serif; position:fixed; width:100vw; height:100dvh; }
    #gameCanvas { display:block; width:100%; height:100%; }
    #ui-layer { position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:10; }
    #health-bar-container { position:absolute; top:20px; left:20px; right:20px; height:18px; background:rgba(0,0,0,0.6); border-radius:10px; overflow:hidden; border:2px solid rgba(255,255,255,0.5); }
    #health-bar-fill { height:100%; width:100%; background:#ff4444; border-radius:8px; transition:width 0.3s; }
    #health-label { position:absolute; top:42px; left:50%; transform:translateX(-50%); color:#fff; font-size:12px; font-weight:bold; text-shadow:0 0 8px black; }
    #score-display { position:absolute; top:20px; right:20px; color:#ffdd00; font-size:16px; font-weight:bold; background:rgba(0,0,0,0.5); padding:8px 16px; border-radius:20px; }
    #crosshair { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:40px; height:40px; }
    #crosshair::before, #crosshair::after { content:''; position:absolute; background:rgba(255,255,255,0.8); }
    #crosshair::before { width:2px; height:24px; left:50%; top:50%; transform:translate(-50%,-50%); }
    #crosshair::after { width:24px; height:2px; left:50%; top:50%; transform:translate(-50%,-50%); }
    #crosshair-dot { position:absolute; width:6px; height:6px; background:red; border-radius:50%; top:50%; left:50%; transform:translate(-50%,-50%); }
    #joystick-zone { position:absolute; bottom:40px; bottom:calc(40px + env(safe-area-inset-bottom,20px)); left:30px; width:140px; height:140px; pointer-events:auto; z-index:20; }
    #joystick-base { width:120px; height:120px; border-radius:50%; background:rgba(255,255,255,0.15); border:3px solid rgba(255,255,255,0.4); position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); }
    #joystick-thumb { width:55px; height:55px; border-radius:50%; background:rgba(255,255,255,0.8); position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); box-shadow:0 0 15px black; }
    #shoot-button { position:absolute; bottom:50px; bottom:calc(50px + env(safe-area-inset-bottom,20px)); right:30px; width:90px; height:90px; border-radius:50%; background:radial-gradient(circle at 30% 30%, #ff5555, #aa0000); border:3px solid white; pointer-events:auto; z-index:20; display:flex; align-items:center; justify-content:center; color:white; font-weight:bold; font-size:18px; }
    #hit-flash { position:absolute; top:0; left:0; width:100%; height:100%; background:transparent; pointer-events:none; z-index:8; }
    #quiz-overlay { position:absolute; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); display:none; align-items:center; justify-content:center; z-index:100; }
    #quiz-overlay.active { display:flex; }
    #quiz-card { background:#1e2a3a; border:2px solid #ff5555; border-radius:20px; padding:30px; max-width:400px; text-align:center; color:white; }
    #quiz-question { font-size:18px; margin:20px 0; }
    .quiz-btn { display:block; width:100%; padding:15px; margin:8px 0; background:rgba(255,255,255,0.1); border:1px solid white; border-radius:10px; color:white; font-size:16px; cursor:pointer; }
    .quiz-btn:hover { background:rgba(255,0,0,0.4); }
  </style>
</head>
<body>
  <canvas id="gameCanvas"></canvas>
  <div id="ui-layer">
    <div id="health-bar-container"><div id="health-bar-fill"></div></div>
    <div id="health-label">HP 100</div>
    <div id="score-display">🎯 0</div>
    <div id="crosshair"><div id="crosshair-dot"></div></div>
    <div id="joystick-zone"><div id="joystick-base"></div><div id="joystick-thumb"></div></div>
    <div id="shoot-button">FIRE</div>
    <div id="hit-flash"></div>
    <div id="quiz-overlay">
      <div id="quiz-card">
        <h2>💀 YOU DIED</h2>
        <p>Answer correctly to respawn</p>
        <div id="quiz-question"></div>
        <div id="quiz-answers"></div>
      </div>
    </div>
  </div>

  <script type="importmap">
    { "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js" } }
  </script>
  <script type="module">
    import * as THREE from 'three';

    // ---------- DOM elements ----------
    const canvas = document.getElementById('gameCanvas');
    const healthFill = document.getElementById('health-bar-fill');
    const healthLabel = document.getElementById('health-label');
    const scoreDisplay = document.getElementById('score-display');
    const shootBtn = document.getElementById('shoot-button');
    const joystickThumb = document.getElementById('joystick-thumb');
    const joystickZone = document.getElementById('joystick-zone');
    const hitFlash = document.getElementById('hit-flash');
    const quizOverlay = document.getElementById('quiz-overlay');
    const quizQuestion = document.getElementById('quiz-question');
    const quizAnswers = document.getElementById('quiz-answers');

    // ---------- Three.js setup ----------
    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    const scene = new THREE.Scene();
    scene.background = new THREE.Color('#87CEEB');
    const camera = new THREE.PerspectiveCamera(70, window.innerWidth/window.innerHeight, 0.1, 80);
    camera.position.set(0, 1.7, 0);
    scene.add(new THREE.AmbientLight(0xffffff, 0.7));
    const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
    dirLight.position.set(10,20,10); dirLight.castShadow=true; scene.add(dirLight);
    const ground = new THREE.Mesh(new THREE.PlaneGeometry(60,60), new THREE.MeshStandardMaterial({color:'#4a8c3f'}));
    ground.rotation.x=-Math.PI/2; ground.receiveShadow=true; scene.add(ground);
    // simple buildings
    for(let x=-15; x<=15; x+=10){
      for(let z=-15; z<=15; z+=10){
        if(Math.random()<0.3) continue;
        const h = 3+Math.random()*5;
        const b = new THREE.Mesh(new THREE.BoxGeometry(2, h, 2), new THREE.MeshStandardMaterial({color:`hsl(${Math.random()*60+20},40%,60%)`}));
        b.position.set(x, h/2, z); b.castShadow=b.receiveShadow=true; scene.add(b);
      }
    }

    // ---------- Player state ----------
    const player = { pos: new THREE.Vector3(0,1.7,0), health:100, maxHealth:100, score:0, dead:false, yaw:0, pitch:0, shootCooldown:0 };
    // Gun in camera
    const gun = new THREE.Mesh(new THREE.BoxGeometry(0.1,0.1,0.4), new THREE.MeshStandardMaterial({color:'#222222'}));
    gun.position.set(0.2,-0.15,-0.5); camera.add(gun); scene.add(camera);

    // ---------- NPCs ----------
    const npcs = [];
    function createNPC(x,z){
      const group = new THREE.Group();
      group.add(new THREE.Mesh(new THREE.CapsuleGeometry(0.35,0.9), new THREE.MeshStandardMaterial({color:'#aa3333'})));
      const head = new THREE.Mesh(new THREE.SphereGeometry(0.3), new THREE.MeshStandardMaterial({color:'#e8c8a0'}));
      head.position.y=1.9; group.add(head);
      group.position.set(x,0,z); scene.add(group);
      return { mesh:group, health:3, alive:true, shootTimer:1+Math.random()*2, state:'chase' };
    }
    for(let i=0;i<5;i++) npcs.push(createNPC((Math.random()-0.5)*25, (Math.random()-0.5)*25));

    // ---------- Bullets ----------
    const playerBullets = [], npcBullets = [];
    function fireBullet(origin, dir, speed, color, isPlayer){
      const bullet = new THREE.Mesh(new THREE.SphereGeometry(0.08), new THREE.MeshBasicMaterial({color}));
      bullet.position.copy(origin); bullet.userData={vel:dir.clone().multiplyScalar(speed), life:2, isPlayer};
      scene.add(bullet);
      return bullet;
    }

    // ---------- Controls ----------
    let moveX=0, moveZ=0, shootPressed=false;
    // Joystick
    let joyActive=false, joyId=null, joyBasePos={x:0,y:0};
    joystickZone.addEventListener('touchstart', e=>{
      const t=e.changedTouches[0]; joyActive=true; joyId=t.identifier;
      const r=joystickZone.getBoundingClientRect();
      joyBasePos.x=r.left+r.width/2; joyBasePos.y=r.top+r.height/2;
      joystickThumb.style.transform='translate(-50%,-50%)';
      e.preventDefault();
    });
    joystickZone.addEventListener('touchmove', e=>{
      if(!joyActive) return;
      for(let t of e.changedTouches){
        if(t.identifier===joyId){
          const dx=t.clientX-joyBasePos.x, dy=t.clientY-joyBasePos.y;
          let mx=Math.max(-1,Math.min(1,dx/50)), my=Math.max(-1,Math.min(1,dy/50));
          moveX=mx; moveZ=my;
          joystickThumb.style.transform=`translate(calc(-50% + ${mx*40}px), calc(-50% + ${my*40}px))`;
        }
      }
      e.preventDefault();
    });
    joystickZone.addEventListener('touchend', e=>{
      for(let t of e.changedTouches) if(t.identifier===joyId){ joyActive=false; moveX=0; moveZ=0; joystickThumb.style.transform='translate(-50%,-50%)'; }
    });
    // Shoot button
    shootBtn.addEventListener('touchstart', e=>{ shootPressed=true; playerShoot(); e.preventDefault(); });
    shootBtn.addEventListener('touchend', ()=> shootPressed=false);
    // Look controls (drag right side)
    let lookActive=false, lookId=null, prevLook={x:0,y:0};
    document.addEventListener('touchstart', e=>{
      for(let t of e.changedTouches){
        if(t.clientX > window.innerWidth/2 && t.target !== shootBtn){
          lookActive=true; lookId=t.identifier; prevLook.x=t.clientX; prevLook.y=t.clientY;
        }
      }
    }, {passive:false});
    document.addEventListener('touchmove', e=>{
      if(!lookActive) return;
      for(let t of e.changedTouches){
        if(t.identifier===lookId){
          const dx=t.clientX-prevLook.x, dy=t.clientY-prevLook.y;
          player.yaw -= dx*0.003; player.pitch -= dy*0.003;
          player.pitch = Math.max(-1.2, Math.min(1.2, player.pitch));
          prevLook.x=t.clientX; prevLook.y=t.clientY;
        }
      }
      e.preventDefault();
    }, {passive:false});
    document.addEventListener('touchend', e=>{ for(let t of e.changedTouches) if(t.identifier===lookId) lookActive=false; });

    // Shooting
    function playerShoot(){
      if(player.dead || player.shootCooldown>0) return;
      player.shootCooldown=0.25;
      const dir = new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion);
      fireBullet(player.pos.clone().add(dir.clone().multiplyScalar(0.5)), dir, 30, '#ffdd44', true);
    }

    // NPC AI
    function updateNPC(delta){
      for(let npc of npcs){
        if(!npc.alive) continue;
        const toPlayer = player.pos.clone().sub(npc.mesh.position);
        const dist = toPlayer.length();
        if(dist<15 && dist>2){
          const move = toPlayer.normalize().multiplyScalar(2*delta);
          npc.mesh.position.add(move);
          npc.mesh.lookAt(player.pos.x, 0, player.pos.z);
        }
        if(dist<12){
          npc.shootTimer -= delta;
          if(npc.shootTimer<=0){
            npc.shootTimer = 1.2 + Math.random()*1.5;
            const dir = toPlayer.normalize().add(new THREE.Vector3((Math.random()-0.5)*0.2, (Math.random()-0.5)*0.2, (Math.random()-0.5)*0.2)).normalize();
            fireBullet(npc.mesh.position.clone().add(new THREE.Vector3(0,1.5,0)), dir, 15, '#ff4444', false);
          }
        }
      }
    }

    // Collision & damage
    function checkPlayerHit(){
      for(let i=npcBullets.length-1; i>=0; i--){
        const b=npcBullets[i];
        if(b.position.distanceTo(player.pos)<0.6 && !player.dead){
          player.health -= 15 + Math.floor(Math.random()*15);
          player.health = Math.max(0, player.health);
          hitFlash.style.background='rgba(255,0,0,0.4)'; setTimeout(()=> hitFlash.style.background='transparent',150);
          scene.remove(b); npcBullets.splice(i,1);
          if(player.health<=0) die();
        }
      }
    }

    function checkBulletHits(){
      for(let i=playerBullets.length-1; i>=0; i--){
        const b=playerBullets[i];
        for(let npc of npcs){
          if(!npc.alive) continue;
          if(b.position.distanceTo(npc.mesh.position)<0.9){
            npc.health--; scene.remove(b); playerBullets.splice(i,1);
            if(npc.health<=0){ npc.alive=false; scene.remove(npc.mesh); player.score+=10; }
            break;
          }
        }
      }
      // remove out-of-bounds bullets
      [...playerBullets, ...npcBullets].forEach((b,i,arr)=>{
        if(b.userData.life<=0 || b.position.length()>35){ scene.remove(b); arr.splice(i,1); }
      });
    }

    function die(){
      player.dead=true; player.health=0;
      quizOverlay.classList.add('active');
      const q = Math.random()<0.5 ? 
        {q:"What does our design do?", a:["A. Make more male turtles","B. Balance the ratio of male and female turtles"], correct:1} :
        {q:"Do we need more female or male turtles?", a:["A. Female","B. Male"], correct:1};
      quizQuestion.textContent = q.q;
      quizAnswers.innerHTML = q.a.map((ans,i)=>`<button class="quiz-btn">${ans}</button>`).join('');
      quizAnswers.querySelectorAll('button').forEach((btn,i)=>{
        btn.onclick = ()=>{
          if(i===q.correct){ 
            player.health=player.maxHealth; player.dead=false; player.pos.set(0,1.7,0);
            quizOverlay.classList.remove('active');
          } else {
            btn.style.background='#ff0000'; setTimeout(()=> btn.style.background='',300);
          }
        };
      });
    }

    // Game loop
    function animate(){
      requestAnimationFrame(animate);
      const delta = Math.min(0.05, 0.016);
      if(!player.dead){
        // movement
        const forward = new THREE.Vector3(-Math.sin(player.yaw),0,-Math.cos(player.yaw));
        const right = new THREE.Vector3(Math.cos(player.yaw),0,-Math.sin(player.yaw));
        const move = forward.multiplyScalar(-moveZ).add(right.multiplyScalar(moveX));
        if(move.length()>0){ move.normalize().multiplyScalar(5*delta); player.pos.add(move); }
        camera.position.copy(player.pos);
        camera.rotation.order='YXZ'; camera.rotation.y=player.yaw; camera.rotation.x=player.pitch;
        if(player.shootCooldown>0) player.shootCooldown-=delta;
        updateNPC(delta);
        // update bullets
        playerBullets.forEach(b=>{ b.position.add(b.userData.vel.clone().multiplyScalar(delta)); b.userData.life-=delta; });
        npcBullets.forEach(b=>{ b.position.add(b.userData.vel.clone().multiplyScalar(delta)); b.userData.life-=delta; });
        checkBulletHits();
        checkPlayerHit();
        // UI
        healthFill.style.width = (player.health/player.maxHealth*100)+'%';
        healthLabel.textContent = 'HP '+Math.round(player.health);
        scoreDisplay.textContent = '🎯 '+player.score;
      }
      renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', ()=>{
      renderer.setSize(window.innerWidth, window.innerHeight);
      camera.aspect = window.innerWidth/window.innerHeight;
      camera.updateProjectionMatrix();
    });
  </script>
</body>
</html>
