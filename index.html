<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>3D Shooter – Turtle Conservation</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none; }
        body { background:#000; overflow:hidden; touch-action:manipulation; font-family:Arial,sans-serif; position:fixed; width:100vw; height:100dvh; }
        #gameCanvas { display:block; width:100%; height:100%; }
        #ui-layer { position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:10; }
        #health-bar-container { position:absolute; top:20px; left:20px; right:20px; height:18px; background:rgba(0,0,0,0.6); border-radius:10px; overflow:hidden; border:2px solid rgba(255,255,255,0.5); }
        #health-bar-fill { height:100%; width:100%; background:#ff4444; border-radius:8px; transition:width 0.3s; }
        #health-label { position:absolute; top:42px; left:50%; transform:translateX(-50%); color:#fff; font-size:12px; font-weight:bold; text-shadow:0 0 8px black; }
        #score-display { position:absolute; top:20px; right:20px; color:#ffdd00; font-size:16px; font-weight:bold; background:rgba(0,0,0,0.5); padding:8px 16px; border-radius:20px; }
        #crosshair { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:40px; height:40px; }
        #crosshair::before, #crosshair::after { content:''; position:absolute; background:rgba(255,255,255,0.8); }
        #crosshair::before { width:2px; height:24px; left:50%; top:50%; transform:translate(-50%,-50%); }
        #crosshair::after { width:24px; height:2px; left:50%; top:50%; transform:translate(-50%,-50%); }
        #crosshair-dot { position:absolute; width:6px; height:6px; background:red; border-radius:50%; top:50%; left:50%; transform:translate(-50%,-50%); }
        #joystick-zone { position:absolute; bottom:40px; bottom:calc(40px + env(safe-area-inset-bottom,20px)); left:30px; width:140px; height:140px; pointer-events:auto; z-index:20; }
        #joystick-base { width:120px; height:120px; border-radius:50%; background:rgba(255,255,255,0.15); border:3px solid rgba(255,255,255,0.4); position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); }
        #joystick-thumb { width:55px; height:55px; border-radius:50%; background:rgba(255,255,255,0.8); position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); box-shadow:0 0 15px black; }
        #shoot-button { position:absolute; bottom:50px; bottom:calc(50px + env(safe-area-inset-bottom,20px)); right:30px; width:90px; height:90px; border-radius:50%; background:radial-gradient(circle at 30% 30%, #ff5555, #aa0000); border:3px solid white; pointer-events:auto; z-index:20; display:flex; align-items:center; justify-content:center; color:white; font-weight:bold; font-size:18px; }
        #hit-flash { position:absolute; top:0; left:0; width:100%; height:100%; background:transparent; pointer-events:none; z-index:8; transition: background 0.1s; }
        
        /* QUIZ OVERLAY - Transparent background to see gameplay */
        #quiz-overlay { position:absolute; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.4); display:none; align-items:center; justify-content:center; z-index:100; pointer-events:auto; backdrop-filter:blur(3px); -webkit-backdrop-filter:blur(3px); }
        #quiz-overlay.active { display:flex; }
        #quiz-card { background:linear-gradient(145deg, rgba(26,26,46,0.95), rgba(22,33,62,0.95)); border:3px solid #e94560; border-radius:20px; padding:40px 30px; max-width:500px; width:90%; text-align:center; color:white; box-shadow:0 20px 60px rgba(233,68,96,0.6), 0 0 100px rgba(0,0,0,0.5); }
        #quiz-title { font-size:28px; font-weight:bold; margin-bottom:10px; color:#ff6b6b; }
        #quiz-subtitle { font-size:14px; color:#ccc; margin-bottom:25px; }
        #quiz-question { font-size:20px; margin:20px 0; font-weight:bold; }
        .quiz-btn { display:block; width:100%; padding:18px; margin:12px 0; background:rgba(255,255,255,0.1); border:2px solid rgba(255,255,255,0.3); border-radius:12px; color:white; font-size:18px; cursor:pointer; transition:all 0.2s; }
        .quiz-btn:active { background:rgba(233,68,96,0.5); border-color:#e94560; transform:scale(0.98); }
        
        .damage-popup { position:absolute; color:#ffdd00; font-weight:bold; font-size:24px; pointer-events:none; z-index:50; text-shadow:0 0 10px rgba(255,200,0,0.8); animation:floatUp 1s ease-out forwards; }
        @keyframes floatUp { 0% { opacity:1; transform:translateY(0); } 100% { opacity:0; transform:translateY(-60px); } }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <div id="ui-layer">
        <div id="health-bar-container"><div id="health-bar-fill"></div></div>
        <div id="health-label">HP 250</div>
        <div id="score-display">Score: 0</div>
        <div id="crosshair"><div id="crosshair-dot"></div></div>
        <div id="joystick-zone"><div id="joystick-base"></div><div id="joystick-thumb"></div></div>
        <div id="shoot-button">FIRE IN THE HOLE</div>
        <div id="hit-flash"></div>
        <div id="quiz-overlay">
            <div id="quiz-card">
                <div id="quiz-title">YOU DIED OMG NOW DO THESE UWU</div>
                <div id="quiz-subtitle">Answer correctly to respawn</div>
                <div id="quiz-question"></div>
                <div id="quiz-answers"></div>
            </div>
        </div>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js" } }
    </script>
    <script type="module">
        import * as THREE from 'three';

        // DOM elements
        const canvas = document.getElementById('gameCanvas');
        const healthFill = document.getElementById('health-bar-fill');
        const healthLabel = document.getElementById('health-label');
        const scoreDisplay = document.getElementById('score-display');
        const shootBtn = document.getElementById('shoot-button');
        const joystickThumb = document.getElementById('joystick-thumb');
        const joystickZone = document.getElementById('joystick-zone');
        const hitFlash = document.getElementById('hit-flash');
        const uiLayer = document.getElementById('ui-layer');
        const quizOverlay = document.getElementById('quiz-overlay');
        const quizQuestion = document.getElementById('quiz-question');
        const quizAnswers = document.getElementById('quiz-answers');

        // Show damage popup near NPC
        function showDamagePopup(worldPos, damage, isHeadshot = false) {
            const vector = worldPos.clone().project(camera);
            const x = (vector.x * 0.5 + 0.5) * window.innerWidth;
            const y = (-vector.y * 0.5 + 0.5) * window.innerHeight;
            
            const popup = document.createElement('div');
            popup.className = 'damage-popup';
            popup.textContent = isHeadshot ? `💀 ${damage}` : `-${damage}`;
            popup.style.left = x + 'px';
            popup.style.top = y + 'px';
            if (isHeadshot) {
                popup.style.color = '#ff3333';
                popup.style.fontSize = '32px';
                popup.style.textShadow = '0 0 15px rgba(255,0,0,0.9)';
            }
            uiLayer.appendChild(popup);
            
            setTimeout(() => {
                if (popup.parentNode) popup.parentNode.removeChild(popup);
            }, 1000);
        }

        // Three.js setup
        const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        const scene = new THREE.Scene();
        scene.background = new THREE.Color('#87CEEB');
        scene.fog = new THREE.Fog('#87CEEB', 25, 70);
        const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.2, 80);
        camera.position.set(0, 1.7, 0);
        scene.add(camera);

        // Lighting
        scene.add(new THREE.AmbientLight('#ffffff', 0.6));
        const sun = new THREE.DirectionalLight('#ffffff', 1.8);
        sun.position.set(15, 25, 10);
        sun.castShadow = true;
        sun.shadow.mapSize.set(1024, 1024);
        scene.add(sun);

        // Ground
        const ground = new THREE.Mesh(
            new THREE.PlaneGeometry(60, 60),
            new THREE.MeshStandardMaterial({ color: '#4a8c3f', roughness: 0.9 })
        );
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);

        // Buildings
        const buildings = [];
        function addBuilding(x, z, w, h, d, color) {
            const geo = new THREE.BoxGeometry(w, h, d);
            const mat = new THREE.MeshStandardMaterial({ color, roughness: 0.7 });
            const mesh = new THREE.Mesh(geo, mat);
            mesh.position.set(x, h / 2, z);
            mesh.castShadow = mesh.receiveShadow = true;
            mesh.userData = { type: 'building', x, z, w, h, d };
            scene.add(mesh);
            buildings.push(mesh);
        }

        const buildingData = [
            [-10, -10, 3, 5, 3, '#b0a89c'],
            [10, -8, 4, 6, 2.5, '#c4b9a8'],
            [-8, 8, 2.5, 4, 4, '#a89880'],
            [9, 9, 3.5, 7, 3.5, '#bfb09a'],
            [-13, 2, 2, 3.5, 5, '#d4c8b0'],
            [13, -4, 5, 5, 2, '#9e8e78'],
            [0, -15, 6, 3, 3, '#c8bca5'],
            [3, 14, 3, 6, 4, '#a09080'],
            [-6, -17, 3.5, 3.5, 3.5, '#c0b098'],
            [7, -14, 2.5, 6, 2.5, '#a89878'],
        ];
        buildingData.forEach(d => addBuilding(...d));

        // Player
        const player = {
            pos: new THREE.Vector3(0, 1.7, 0),
            health: 250,
            maxHealth: 250,
            score: 0,
            dead: false,
            yaw: 0,
            pitch: 0,
            shootCooldown: 0,
            shootDelay: 0.15,
            radius: 0.4,
            moveSpeed: 5.5,
        };

        // Gun in camera
        const gun = new THREE.Mesh(
            new THREE.BoxGeometry(0.1, 0.1, 0.5),
            new THREE.MeshStandardMaterial({ color: '#333', metalness: 0.8 })
        );
        gun.position.set(0.2, -0.2, -0.5);
        camera.add(gun);

        // NPCs
        const npcs = [];
        function spawnNPC(x, z) {
            const group = new THREE.Group();
            const body = new THREE.Mesh(
                new THREE.CapsuleGeometry(0.35, 0.9),
                new THREE.MeshStandardMaterial({ color: '#aa3333', roughness: 0.5 })
            );
            group.add(body);
            const head = new THREE.Mesh(
                new THREE.SphereGeometry(0.3),
                new THREE.MeshStandardMaterial({ color: '#e8c8a0' })
            );
            head.position.y = 1.9;
            head.name = 'head';
            group.add(head);
            group.position.set(x, 0, z);
            scene.add(group);
            npcs.push({
                mesh: group,
                health: 100,
                alive: true,
                shootTimer: 1 + Math.random() * 2,
                shootDelay: 1.5,
                speed: 2.2,
            });
        }
        for (let i = 0; i < 6; i++) {
            const angle = Math.random() * Math.PI * 2;
            const dist = 14 + Math.random() * 8;
            spawnNPC(Math.cos(angle) * dist, Math.sin(angle) * dist);
        }

        // Particle effects
        function spawnHitParticles(position, color) {
            for (let i = 0; i < 8; i++) {
                const particle = new THREE.Mesh(
                    new THREE.SphereGeometry(0.04, 4, 4),
                    new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 1 })
                );
                particle.position.copy(position);
                particle.userData = {
                    vel: new THREE.Vector3(
                        (Math.random() - 0.5) * 4,
                        Math.random() * 3 + 1,
                        (Math.random() - 0.5) * 4
                    ),
                    life: 0.5
                };
                scene.add(particle);
                
                const removeParticle = () => {
                    particle.userData.life -= 0.016;
                    particle.material.opacity = particle.userData.life / 0.5;
                    particle.position.add(particle.userData.vel.clone().multiplyScalar(0.016));
                    if (particle.userData.life <= 0) {
                        scene.remove(particle);
                        return;
                    }
                    requestAnimationFrame(removeParticle);
                };
                removeParticle();
            }
        }

        // Bullet arrays
        const playerBullets = [];
        const npcBullets = [];

        function createBullet(origin, dir, speed, color, owner) {
            const bullet = new THREE.Mesh(
                new THREE.SphereGeometry(0.08, 6, 6),
                new THREE.MeshBasicMaterial({ color })
            );
            bullet.position.copy(origin);
            bullet.userData = {
                vel: dir.clone().normalize().multiplyScalar(speed),
                life: 2.5,
                owner,
            };
            scene.add(bullet);
            if (owner === 'player') playerBullets.push(bullet);
            else npcBullets.push(bullet);
            return bullet;
        }

        function playerShoot() {
            if (player.dead || player.shootCooldown > 0) return;
            player.shootCooldown = player.shootDelay;
            const dir = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
            const origin = player.pos.clone().add(dir.clone().multiplyScalar(0.6));
            createBullet(origin, dir, 80, '#ffdd44', 'player');
        }

        function resolveCollision(pos, radius) {
            for (const b of buildings) {
                const d = b.userData;
                const halfW = d.w / 2;
                const halfD = d.d / 2;
                const minX = d.x - halfW;
                const maxX = d.x + halfW;
                const minZ = d.z - halfD;
                const maxZ = d.z + halfD;
                const closestX = Math.max(minX, Math.min(pos.x, maxX));
                const closestZ = Math.max(minZ, Math.min(pos.z, maxZ));
                const dx = pos.x - closestX;
                const dz = pos.z - closestZ;
                const dist = Math.sqrt(dx * dx + dz * dz);
                if (dist < radius && dist > 0.001 && pos.y < d.h + 0.5) {
                    const overlap = radius - dist;
                    pos.x += (dx / dist) * overlap;
                    pos.z += (dz / dist) * overlap;
                }
            }
        }

        function npcShoot(npc) {
            const origin = npc.mesh.position.clone();
            origin.y += 1.5;
            const target = player.pos.clone();
            let dir = target.sub(origin).normalize();
            dir.x += (Math.random() - 0.5) * 0.15;
            dir.y += (Math.random() - 0.5) * 0.15;
            dir.z += (Math.random() - 0.5) * 0.15;
            dir.normalize();
            createBullet(origin, dir, 20, '#ff4444', 'npc');
        }

        // QUIZ SYSTEM
        const questions = [
            {
                q: "What does our design do?",
                a: ["A. Make more male turtles", "B. Balance the ratio of male and female turtles"],
                correct: 1
            },
            {
                q: "Do we need more female or male turtles?",
                a: ["A. Female", "B. Male"],
                correct: 1
            },
            {
                q: "Global weather change is causing more of which gender?",
                a: ["A. Female turtles (warmer sand)", "B. Male turtles (cooler sand)"],
                correct: 0
            }
        ];

        function showQuiz() {
            quizOverlay.classList.add('active');
            const q = questions[Math.floor(Math.random() * questions.length)];
            quizQuestion.textContent = q.q;
            quizAnswers.innerHTML = '';
            
            q.a.forEach((ans, i) => {
                const btn = document.createElement('button');
                btn.className = 'quiz-btn';
                btn.textContent = ans;
                btn.addEventListener('click', () => {
                    if (i === q.correct) {
                        player.health = player.maxHealth;
                        player.dead = false;
                        player.pos.set(0, 1.7, 0);
                        quizOverlay.classList.remove('active');
                    } else {
                        btn.style.background = 'rgba(255,0,0,0.6)';
                        btn.style.borderColor = '#ff0000';
                        setTimeout(() => {
                            btn.style.background = 'rgba(255,255,255,0.1)';
                            btn.style.borderColor = 'rgba(255,255,255,0.3)';
                        }, 500);
                    }
                });
                quizAnswers.appendChild(btn);
            });
        }

        // Controls
        let joyMoveX = 0, joyMoveY = 0;
        let joyActive = false, joyId = null, joyBase = { x: 0, y: 0 };
        joystickZone.addEventListener('touchstart', (e) => {
            const t = e.changedTouches[0];
            joyActive = true;
            joyId = t.identifier;
            const r = joystickZone.getBoundingClientRect();
            joyBase.x = r.left + r.width / 2;
            joyBase.y = r.top + r.height / 2;
            e.preventDefault();
        });
        joystickZone.addEventListener('touchmove', (e) => {
            if (!joyActive) return;
            for (const t of e.changedTouches) {
                if (t.identifier === joyId) {
                    let dx = t.clientX - joyBase.x;
                    let dy = t.clientY - joyBase.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    const max = 50;
                    if (dist > max) { dx = (dx / dist) * max; dy = (dy / dist) * max; }
                    joyMoveX = dx / max;
                    joyMoveY = dy / max;
                    joystickThumb.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
                }
            }
            e.preventDefault();
        });
        joystickZone.addEventListener('touchend', (e) => {
            for (const t of e.changedTouches) {
                if (t.identifier === joyId) {
                    joyActive = false;
                    joyMoveX = 0;
                    joyMoveY = 0;
                    joystickThumb.style.transform = 'translate(-50%, -50%)';
                }
            }
        });

        shootBtn.addEventListener('touchstart', (e) => { playerShoot(); e.preventDefault(); });

        let lookActive = false, lookId = null, prevLook = { x: 0, y: 0 };
        document.addEventListener('touchstart', (e) => {
            for (const t of e.changedTouches) {
                if (t.clientX > window.innerWidth / 2 && t.target !== shootBtn && !t.target.closest('#joystick-zone')) {
                    lookActive = true;
                    lookId = t.identifier;
                    prevLook.x = t.clientX;
                    prevLook.y = t.clientY;
                }
            }
        }, { passive: false });
        document.addEventListener('touchmove', (e) => {
            if (!lookActive) return;
            for (const t of e.changedTouches) {
                if (t.identifier === lookId) {
                    const dx = t.clientX - prevLook.x;
                    const dy = t.clientY - prevLook.y;
                    player.yaw -= dx * 0.003;
                    player.pitch -= dy * 0.003;
                    player.pitch = Math.max(-1.2, Math.min(1.2, player.pitch));
                    prevLook.x = t.clientX;
                    prevLook.y = t.clientY;
                }
            }
            e.preventDefault();
        }, { passive: false });
        document.addEventListener('touchend', (e) => {
            for (const t of e.changedTouches) {
                if (t.identifier === lookId) lookActive = false;
            }
        });

        const keys = {};
        window.addEventListener('keydown', e => { keys[e.key.toLowerCase()] = true; e.preventDefault(); });
        window.addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; e.preventDefault(); });
        window.addEventListener('mousedown', e => { if (e.button === 0) playerShoot(); });

        // Game loop
        const clock = new THREE.Clock();
        function update(dt) {
            // ALWAYS UPDATE GAME WORLD even when dead
            // Update bullets and NPCs regardless of player state
            
            // NPC AI (still runs when player is dead)
            for (const npc of npcs) {
                if (!npc.alive) continue;
                const toPlayer = new THREE.Vector3().copy(player.pos).sub(npc.mesh.position);
                const dist = toPlayer.length();

                if (dist < 18 && dist > 1.2 && !player.dead) {
                    const moveDir = toPlayer.clone();
                    moveDir.y = 0;
                    if (moveDir.lengthSq() > 0.001) {
                        moveDir.normalize();
                        const move = moveDir.multiplyScalar(npc.speed * dt);
                        const newNpcPos = npc.mesh.position.clone().add(move);
                        resolveCollision(newNpcPos, 0.45);
                        npc.mesh.position.copy(newNpcPos);
                    }
                    npc.mesh.lookAt(player.pos.x, 0, player.pos.z);
                }

                if (dist < 14 && !player.dead) {
                    npc.shootTimer -= dt;
                    if (npc.shootTimer <= 0) {
                        npc.shootTimer = npc.shootDelay;
                        npcShoot(npc);
                    }
                }
            }

            // Update bullets always
            for (const arr of [playerBullets, npcBullets]) {
                for (const b of arr) {
                    b.position.add(b.userData.vel.clone().multiplyScalar(dt));
                    b.userData.life -= dt;
                }
            }

            if (!player.dead) {
                // Movement
                let mx = joyMoveX, mz = joyMoveY;
                if (keys['w'] || keys['arrowup']) mz = -1;
                if (keys['s'] || keys['arrowdown']) mz = 1;
                if (keys['a'] || keys['arrowleft']) mx = -1;
                if (keys['d'] || keys['arrowright']) mx = 1;
                const mag = Math.sqrt(mx * mx + mz * mz);
                if (mag > 1) { mx /= mag; mz /= mag; }

                const forward = new THREE.Vector3(-Math.sin(player.yaw), 0, -Math.cos(player.yaw));
                const right = new THREE.Vector3(Math.cos(player.yaw), 0, -Math.sin(player.yaw));
                const moveVec = forward.multiplyScalar(-mz).add(right.multiplyScalar(mx));
                if (moveVec.lengthSq() > 0) {
                    moveVec.normalize().multiplyScalar(player.moveSpeed * dt);
                    const newPos = player.pos.clone().add(moveVec);
                    resolveCollision(newPos, player.radius);
                    player.pos.copy(newPos);
                }
                player.pos.y = 1.7;
                camera.position.copy(player.pos);
                camera.rotation.order = 'YXZ';
                camera.rotation.y = player.yaw;
                camera.rotation.x = player.pitch;

                if (player.shootCooldown > 0) player.shootCooldown -= dt;
            } else {
                // When dead, camera stays at death position but still renders
                // NPCs can still move around and bullets fly
            }

            // Player bullet hits NPCs
            for (let i = playerBullets.length - 1; i >= 0; i--) {
                const b = playerBullets[i];
                let hit = false;
                for (const npc of npcs) {
                    if (!npc.alive) continue;
                    
                    const npcHeadPos = npc.mesh.position.clone();
                    npcHeadPos.y += 1.9;
                    const distToHead = b.position.distanceTo(npcHeadPos);
                    
                    const npcBodyPos = npc.mesh.position.clone();
                    npcBodyPos.y += 1.0;
                    const distToBody = b.position.distanceTo(npcBodyPos);
                    
                    if (distToHead < 0.4) {
                        const damage = 15;
                        npc.health -= damage;
                        spawnHitParticles(npcHeadPos, '#ff3333');
                        showDamagePopup(npcHeadPos, damage, true);
                        scene.remove(b);
                        playerBullets.splice(i, 1);
                        
                        if (npc.health <= 0) {
                            npc.alive = false;
                            scene.remove(npc.mesh);
                            player.score += 20;
                        }
                        hit = true;
                        break;
                    } else if (distToBody < 0.9) {
                        const damage = 12;
                        npc.health -= damage;
                        spawnHitParticles(npcBodyPos, '#ffdd44');
                        showDamagePopup(npcBodyPos, damage, false);
                        scene.remove(b);
                        playerBullets.splice(i, 1);
                        
                        if (npc.health <= 0) {
                            npc.alive = false;
                            scene.remove(npc.mesh);
                            player.score += 10;
                        }
                        hit = true;
                        break;
                    }
                }
                if (hit) continue;
                if (b.userData.life <= 0 || Math.abs(b.position.x) > 35 || Math.abs(b.position.z) > 35 || b.position.y < -2 || b.position.y > 20) {
                    scene.remove(b);
                    playerBullets.splice(i, 1);
                }
            }

            // NPC bullet hits player
            for (let i = npcBullets.length - 1; i >= 0; i--) {
                const b = npcBullets[i];
                if (!player.dead && b.position.distanceTo(player.pos) < 0.8) {
                    const dmg = 15 + Math.floor(Math.random() * 10);
                    player.health = Math.max(0, player.health - dmg);
                    hitFlash.style.background = 'rgba(255,0,0,0.5)';
                    setTimeout(() => hitFlash.style.background = 'transparent', 200);
                    scene.remove(b);
                    npcBullets.splice(i, 1);
                    if (player.health <= 0) {
                        player.dead = true;
                        showQuiz();
                    }
                    continue;
                }
                if (b.userData.life <= 0 || Math.abs(b.position.x) > 35 || Math.abs(b.position.z) > 35 || b.position.y < -2 || b.position.y > 20) {
                    scene.remove(b);
                    npcBullets.splice(i, 1);
                }
            }

            // UI
            healthFill.style.width = (player.health / player.maxHealth * 100) + '%';
            healthLabel.textContent = 'HP ' + Math.round(player.health);
            scoreDisplay.textContent = 'Score: ' + player.score;

            // Spawn NPCs
            if (npcs.filter(n => n.alive).length < 5 && Math.random() < 0.01) {
                const angle = Math.random() * Math.PI * 2;
                spawnNPC(Math.cos(angle) * 20, Math.sin(angle) * 20);
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            const dt = Math.min(clock.getDelta(), 0.1);
            update(dt);
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            renderer.setSize(window.innerWidth, window.innerHeight);
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
        });
    </script>
</body>
</html>
